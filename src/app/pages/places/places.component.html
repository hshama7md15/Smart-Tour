<div class="places-container">
  <header class="places-header">
    <h1>Egypt Governorates</h1>
    <p>Explore the 27 governorates of Egypt with a brief description and images for each one.</p>
  </header>

  <section class="filters-wrapper">
    <div class="search-row">
      <div class="search-input-wrapper">
        <input
          type="text"
          placeholder="Search by governorate name..."
          [value]="searchTerm"
          (input)="onSearchChange($any($event.target).value)"
        />
        <span class="search-icon">🔎</span>
      </div>
    </div>

    <div class="filter-row">
      <div class="filter-group">
        <label>Sort</label>
        <select [value]="sortOption" (change)="onSortChange($any($event.target).value)">
          <option value="name-asc">A to Z</option>
          <option value="name-desc">Z to A</option>
        </select>
      </div>
    </div>
  </section>

  <div class="loading" *ngIf="loading">
    <p>Loading governorates...</p>
  </div>

  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <div class="governorates-grid" *ngIf="!loading && filteredGovernorates.length > 0">
    <button
      class="governorate-card"
      *ngFor="let gov of filteredGovernorates; trackBy: trackByGovernorateId"
      (click)="goToGovernorate(gov)"
    >
      <div class="governorate-image">
        <img
          [src]="gov.imageUrl"
          [alt]="gov.nameAr"
          loading="lazy"
          (error)="onImageError($event)"
        />
      </div>
      <div class="governorate-info">
        <h3>{{ gov.nameAr }}</h3>
        <p class="gov-name-en">{{ gov.nameEn }}</p>
        <p class="description">{{ gov.description }}</p>
        <span class="btn-explore">Explore attractions →</span>
      </div>
    </button>
  </div>

  <div class="no-results" *ngIf="!loading && filteredGovernorates.length === 0">
    <p>No governorates match your search.</p>
  </div>
</div>
