<div class="chat-standalone-root">
  <header class="chat-standalone-header">
    <h2>Chat - Smart Tour</h2>
  </header>

  <div class="chat-standalone-messages">
    <div *ngFor="let m of messages" class="chat-msg" [ngClass]="m.role">
      <div class="chat-meta">
        <span class="role">{{ m.role }}</span>
        <span class="time">{{ m.createdAt | date:'short' }}</span>
      </div>
      <div class="chat-content" [innerHTML]="m.content | formatChatMessage"></div>
    </div>
  </div>
</div>
